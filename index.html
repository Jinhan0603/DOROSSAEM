<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="refresh" content="0; url=app/index.html">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DOROSSAEM — 강사관리 시스템</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0a0b14;
      color: #e2e8f0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    .loading {
      text-align: center;
    }
    .loading-icon {
      font-size: 3rem;
      margin-bottom: 1rem;
      animation: bounce 1s infinite;
    }
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }
    a { color: #818cf8; }
  </style>
</head>
<body>
  <div class="loading">
    <div class="loading-icon">🎓</div>
    <p>DOROSSAEM 강사관리 시스템으로 이동 중...</p>
    <p><a href="app/index.html">자동 이동이 안 되면 여기를 클릭하세요</a></p>
  </div>
</body>
</html>
